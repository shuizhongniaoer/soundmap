<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>声图 SoundMap</title>
<style>
  :root { --accent: #2e5a88; --bg: #f5f7fa; --card: #fff; --text: #1f2933; --muted: #7b8794; }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); }
  .wrap { max-width: 860px; margin: 0 auto; padding: 32px 20px; }
  h1 { font-size: 24px; color: var(--accent); }
  h1 small { font-size: 13px; color: var(--muted); font-weight: normal; margin-left: 8px; }
  .card { background: var(--card); border-radius: 12px; padding: 20px; margin-top: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .drop { border: 2px dashed #c3cdd8; border-radius: 10px; padding: 36px; text-align: center; color: var(--muted); cursor: pointer; transition: .15s; }
  .drop.over, .drop:hover { border-color: var(--accent); color: var(--accent); background: #eef3f8; }
  input[type=text] { width: 100%; padding: 10px 12px; border: 1px solid #d6dee6; border-radius: 8px; margin-top: 12px; font-size: 14px; }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 8px; padding: 10px 22px; font-size: 14px; margin-top: 12px; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  .item { display: flex; justify-content: space-between; align-items: center; padding: 14px 4px; border-bottom: 1px solid #eef1f4; cursor: pointer; }
  .item:hover .t { color: var(--accent); }
  .item .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .b-done { background: #e3f5e9; color: #1c7c3c; }
  .b-error { background: #fdeaea; color: #c0392b; }
  .b-working { background: #fff4e0; color: #b26a00; }
  .empty { color: var(--muted); text-align: center; padding: 24px; }
  .match { font-size: 12px; color: #526679; margin-top: 5px; max-width: 650px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  .filter-bar select { font-size: 13px; padding: 4px 10px; border: 1px solid #d0d8e0; border-radius: 6px; background: #fff; color: #333; cursor: pointer; }
  .tag-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag-filter .chip { font-size: 12px; padding: 3px 10px; border-radius: 16px; background: #eef3f8; color: var(--accent); cursor: pointer; }
  .tag-filter .chip.on { background: var(--accent); color: #fff; }
  .item-tags { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
  .item-tags .ft { font-size: 11px; padding: 1px 7px; border-radius: 10px; }
  .item-tags .ft.folder { background: #e3edf6; color: #2e5a88; }
  .item-tags .ft.tag { background: #f0f0f0; color: #666; }
  .btn-clear { font-size: 12px; padding: 3px 10px; border-radius: 16px; border: 1px solid #ccc; background: #fff; color: #666; cursor: pointer; }
  .auth-mask { position: fixed; inset: 0; z-index: 20; display: grid; place-items: center; background: rgba(245,247,250,.96); padding: 24px; }
  .auth-box { width: min(400px, 100%); background: #fff; border-radius: 16px; padding: 30px; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,.12); }
  .account-bar { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--muted); }
  .account-bar .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
  .account-bar .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; }
  .account-bar .sync-dot.working { background: #ff9800; animation: pulse 1.5s infinite; }
  .account-bar .sync-dot.error { background: #f44336; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .sync-detail { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .sync-detail span { margin-right: 12px; }
</style>
</head>
<body>
<div class="auth-mask" id="authMask"><div class="auth-box">
  <h1>声图 SoundMap</h1>
  <p id="authHint" style="margin-top:14px;color:var(--muted);line-height:1.7">请登录后继续</p>
  <button id="devLogin" style="display:none">本地测试登录</button>
</div></div>
<div class="wrap">
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
    <h1>声图 <small>录音 → 转写 → AI 总结 → 思维导图</small></h1>
    <div class="account-bar" id="accountBar" style="display:none">
      <div class="avatar" id="userAvatar">?</div>
      <div>
        <div id="userName">声图用户</div>
        <div class="sync-detail" id="syncDetail"></div>
      </div>
      <div class="sync-dot" id="syncDot"></div>
    </div>
  </div>

  <div class="card">
    <div class="drop" id="drop">点击或拖拽上传音频文件（mp3 / m4a / wav / mp4 …）</div>
    <input type="file" id="file" accept="audio/*,video/mp4,.m4a,.amr,.opus" hidden>
    <input type="text" id="title" placeholder="标题（可选，留空由 AI 生成）">
    <div style="display:flex;gap:10px;align-items:center;margin-top:12px;font-size:13px;color:var(--muted)">
      转写引擎：
      <label><input type="radio" name="engine" value="" checked> 默认</label>
      <label><input type="radio" name="engine" value="xfyun"> 讯飞（主力引擎，约¥2/时）</label>
      <label><input type="radio" name="engine" value="volcengine"> 豆包（Seed-ASR 2.0，对决候选）</label>
      <label><input type="radio" name="engine" value="local"> 本地（免费·Mac 算力）</label>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button id="submit" disabled>上传并开始处理</button>
      <button id="recBtn" style="background:#c0392b">🎙️ 录音</button>
      <span id="recHint" style="font-size:12px;color:var(--muted)"></span>
    </div>
    <div id="progressWrap" style="display:none;margin-top:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px">
        <span id="progressLabel">上传中…</span>
        <span id="progressPct"></span>
      </div>
      <div style="background:#e2e8f0;border-radius:4px;height:6px;overflow:hidden">
        <div id="progressBar" style="background:var(--accent);height:100%;width:0%;transition:width .2s"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px">
      <b style="color:var(--accent)">热词表</b>
      <span style="font-size:12px;color:var(--muted)">人名、称呼、专有名词——大幅提升识别准确率；点热词可删除，保存后自动同步到百炼，下次转写生效</span>
    </div>
    <div id="hwChips" style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0"></div>
    <div style="display:flex;gap:8px">
      <input type="text" id="hwInput" placeholder="输入热词后按回车添加（如：商筠晞）" style="margin-top:0;flex:1">
      <button id="hwSave" style="margin-top:0">保存并同步</button>
    </div>
    <div id="hwStatus" style="font-size:12px;color:var(--muted);margin-top:8px"></div>
  </div>

  <div class="card">
    <input type="text" id="search" placeholder="搜索标题、转写全文、说话人或 AI 总结" style="margin:0 0 10px">
    <div class="filter-bar" id="filterBar" style="display:none">
      <select id="folderFilter">
        <option value="">全部文件夹</option>
        <option value="__none__">未分类</option>
      </select>
      <button class="btn-clear" id="clearFilter" style="display:none" onclick="clearFilters()">清除筛选</button>
    </div>
    <div class="tag-filter" id="tagFilter" style="display:none"></div>
    <div id="list"><div class="empty">暂无录音，先上传一个试试</div></div>
  </div>
</div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const submitBtn = document.getElementById('submit');
let picked = null;

async function ensureAuth() {
  const mask = document.getElementById('authMask');
  const me = await fetch('/api/auth/me', { cache: 'no-store' });
  if (me.ok) {
    mask.style.display = 'none';
    const { user } = await me.json();
    loadAccountBar(user);
    return;
  }
  const cfg = await (await fetch('/api/auth/config')).json();
  mask.style.display = 'grid';
  document.getElementById('authHint').textContent = cfg.wechatEnabled
    ? '移动端请使用微信一键登录。Web 微信扫码登录将在网站应用资质通过后接入。'
    : '服务端尚未配置微信登录。';
  const button = document.getElementById('devLogin');
  if (cfg.devLoginEnabled) {
    button.style.display = 'inline-block';
    button.onclick = async () => {
      const result = await fetch('/api/auth/dev', { method: 'POST' });
      if (!result.ok) return alert((await result.json()).error || '登录失败');
      mask.style.display = 'none';
      location.reload();
    };
  }
  await new Promise(() => {});
}
const authReady = ensureAuth();

function loadAccountBar(user) {
  const bar = document.getElementById('accountBar');
  const name = user.nickname || '声图用户';
  document.getElementById('userName').textContent = name;
  document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
  bar.style.display = 'flex';
  loadSyncStatus();
  setInterval(loadSyncStatus, 5000);
}

async function loadSyncStatus() {
  try {
    const s = await (await fetch('/api/sync/status', { cache: 'no-store' })).json();
    const dot = document.getElementById('syncDot');
    const detail = document.getElementById('syncDetail');
    const processing = (s.uploaded || 0) + (s.transcribing || 0) + (s.summarizing || 0);
    const error = s.error || 0;
    
    dot.className = 'sync-dot' + (processing > 0 ? ' working' : error > 0 ? ' error' : '');
    
    const sizeMB = ((s.totalSize || 0) / 1048576).toFixed(1);
    const durMin = Math.round((s.totalDuration || 0) / 60);
    const parts = [
      `共 ${s.total || 0} 条`,
      `已完成 ${s.done || 0}`,
    ];
    if (processing > 0) parts.push(`处理中 ${processing}`);
    if (error > 0) parts.push(`失败 ${error}`);
    parts.push(`存储 ${sizeMB} MB`);
    if (durMin > 0) parts.push(`时长 ${durMin} 分钟`);
    if (s.lastSyncAt) {
      const dt = new Date(s.lastSyncAt);
      parts.push(`最近 ${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours().toString().padStart(2,'0')}:${dt.getMinutes().toString().padStart(2,'0')}`);
    }
    detail.innerHTML = parts.map(p => `<span>${p}</span>`).join('');
  } catch {}
}

drop.onclick = () => fileInput.click();
drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
drop.ondragleave = () => drop.classList.remove('over');
drop.ondrop = e => { e.preventDefault(); drop.classList.remove('over'); pick(e.dataTransfer.files[0]); };
fileInput.onchange = () => pick(fileInput.files[0]);

function pick(f) {
  if (!f) return;
  picked = f;
  drop.textContent = `已选择: ${f.name} (${(f.size / 1048576).toFixed(1)} MB)`;
  submitBtn.disabled = false;
}

// ===== 浏览器录音（MediaRecorder）=====
const recBtn = document.getElementById('recBtn');
const recHint = document.getElementById('recHint');
let mediaRecorder = null, chunks = [], recTimer = null, recStart = 0;

recBtn.onclick = async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') { mediaRecorder.stop(); return; }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    return alert('当前浏览器不支持录音，或页面不是 https/localhost');
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      clearInterval(recTimer);
      recBtn.textContent = '🎙️ 录音';
      recBtn.style.background = '#c0392b';
      recHint.textContent = '';
      const type = mediaRecorder.mimeType || 'audio/webm';
      const ext = type.includes('ogg') ? 'ogg' : type.includes('mp4') ? 'm4a' : 'webm';
      const ts = new Date();
      const name = `录音-${ts.getMonth() + 1}月${ts.getDate()}日 ${String(ts.getHours()).padStart(2, '0')}${String(ts.getMinutes()).padStart(2, '0')}.${ext}`;
      pick(new File([new Blob(chunks, { type })], name, { type }));
    };
    mediaRecorder.start();
    recStart = Date.now();
    recBtn.style.background = '#7b8794';
    recHint.textContent = '录音中，再次点击停止';
    recTimer = setInterval(() => {
      const s = Math.floor((Date.now() - recStart) / 1000);
      recBtn.textContent = `⏹ 停止 ${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
    }, 500);
  } catch (e) {
    alert('无法访问麦克风: ' + e.message);
  }
};

// ===== 分片上传 =====
const CHUNK_THRESHOLD = 10 * 1024 * 1024; // 10MB
const CHUNK_SIZE = 2 * 1024 * 1024; // 2MB
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const progressLabel = document.getElementById('progressLabel');
const progressPct = document.getElementById('progressPct');

function showProgress(sent, total) {
  const pct = total > 0 ? Math.round((sent / total) * 100) : 0;
  progressWrap.style.display = 'block';
  progressBar.style.width = pct + '%';
  progressPct.textContent = pct + '%';
  progressLabel.textContent = `上传中 ${(sent / 1048576).toFixed(1)} / ${(total / 1048576).toFixed(1)} MB`;
}
function hideProgress() {
  progressWrap.style.display = 'none';
  progressBar.style.width = '0%';
}

async function uploadChunked(file, { title, asrProvider }) {
  // 初始化
  const initRes = await fetch('/api/uploads', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename: file.name, size: file.size, chunkSize: CHUNK_SIZE }),
  });
  if (!initRes.ok) throw new Error((await initRes.json()).error || '初始化上传失败');
  const session = await initRes.json();
  const { uploadId, chunkSize, totalChunks } = session;

  // 查询已上传分片（断点续传）
  let received = new Set();
  try {
    const stRes = await fetch(`/api/uploads/${uploadId}`);
    if (stRes.ok) {
      const st = await stRes.json();
      received = new Set(st.received || []);
    }
  } catch {}

  // 上传缺失分片
  for (let i = 0; i < totalChunks; i++) {
    if (received.has(i)) continue;
    const start = i * chunkSize;
    const end = Math.min(start + chunkSize, file.size);
    const chunk = file.slice(start, end);
    const res = await fetch(`/api/uploads/${uploadId}/chunks/${i}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/octet-stream' },
      body: chunk,
    });
    if (!res.ok) throw new Error(`分片 ${i} 上传失败: HTTP ${res.status}`);
    showProgress(end, file.size);
  }

  // 完成
  const completeRes = await fetch(`/api/uploads/${uploadId}/complete`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, asrProvider }),
  });
  if (!completeRes.ok) throw new Error((await completeRes.json()).error || '完成上传失败');
  return await completeRes.json();
}

submitBtn.onclick = async () => {
  await authReady;
  submitBtn.disabled = true;
  submitBtn.textContent = '上传中…';
  const title = document.getElementById('title').value;
  const asrProvider = document.querySelector('input[name=engine]:checked').value;
  try {
    let rec;
    if (picked.size >= CHUNK_THRESHOLD) {
      rec = await uploadChunked(picked, { title, asrProvider });
    } else {
      const fd = new FormData();
      fd.append('audio', picked);
      fd.append('title', title);
      fd.append('asrProvider', asrProvider);
      const res = await fetch('/api/recordings', { method: 'POST', body: fd });
      rec = await res.json();
      if (!res.ok) throw new Error(rec.error);
    }
    location.href = `/detail.html?id=${rec.id}`;
  } catch (e) {
    alert('上传失败: ' + e.message);
    submitBtn.disabled = false;
  }
  hideProgress();
  submitBtn.textContent = '上传并开始处理';
};

// ===== 热词表管理 =====
let hwWords = [];
const hwChips = document.getElementById('hwChips');
const hwInput = document.getElementById('hwInput');
const hwStatus = document.getElementById('hwStatus');

function renderHw() {
  hwChips.innerHTML = hwWords.length
    ? hwWords.map((w, i) =>
        `<span data-i="${i}" style="background:#eef3f8;color:var(--accent);border-radius:20px;padding:4px 14px;font-size:13px;cursor:pointer" title="点击删除">${w} ×</span>`
      ).join('')
    : '<span style="font-size:13px;color:var(--muted)">暂无热词</span>';
  hwChips.querySelectorAll('span[data-i]').forEach(c =>
    c.onclick = () => { hwWords.splice(+c.dataset.i, 1); renderHw(); });
}

hwInput.onkeydown = e => {
  if (e.key !== 'Enter') return;
  const w = hwInput.value.trim();
  if (w && !hwWords.includes(w)) { hwWords.push(w); renderHw(); }
  hwInput.value = '';
};

document.getElementById('hwSave').onclick = async () => {
  if (hwInput.value.trim()) { hwInput.onkeydown({ key: 'Enter' }); }
  hwStatus.textContent = '同步中…';
  const res = await fetch('/api/hotwords', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ words: hwWords }),
  });
  const body = await res.json();
  hwStatus.textContent = res.ok
    ? `已保存 ${body.words.length} 个热词${body.vocabularyId ? '，已同步百炼（词表 ' + body.vocabularyId + '）' : body.note ? '（' + body.note + '）' : ''}`
    : '保存失败: ' + body.error;
};

(async () => {
  await authReady;
  const d = await (await fetch('/api/hotwords')).json();
  hwWords = d.words;
  renderHw();
})();

const STATUS = {
  uploaded: ['排队中', 'b-working'], transcribing: ['转写中', 'b-working'],
  summarizing: ['AI 处理中', 'b-working'], done: ['完成', 'b-done'], error: ['失败', 'b-error'],
};
const searchInput = document.getElementById('search');
const folderSelect = document.getElementById('folderFilter');
const tagFilterEl = document.getElementById('tagFilter');
const filterBar = document.getElementById('filterBar');
const clearBtn = document.getElementById('clearFilter');
let searchTimer = null;
let _folderFilter = null; // null=全部, '__none__'=未分类, 'xxx'=指定
let _tagFilter = null;
let _allFolders = [];
let _allTags = [];

const escapeHtml = value => String(value || '').replace(/[&<>"']/g, c => ({
  '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
}[c]));

searchInput.oninput = () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(refresh, 250);
};

folderSelect.onchange = () => {
  _folderFilter = folderSelect.value || null;
  if (_folderFilter === '__none__') _folderFilter = '__none__';
  updateClearBtn();
  refresh();
};

function clearFilters() {
  _folderFilter = null;
  _tagFilter = null;
  folderSelect.value = '';
  renderTagFilter();
  updateClearBtn();
  refresh();
}

function updateClearBtn() {
  const has = _folderFilter !== null || _tagFilter !== null;
  clearBtn.style.display = has ? 'inline-block' : 'none';
}

function renderTagFilter() {
  if (!_allTags.length) { tagFilterEl.style.display = 'none'; return; }
  tagFilterEl.style.display = 'flex';
  tagFilterEl.innerHTML = _allTags.map(t =>
    `<span class="chip ${_tagFilter === t.name ? 'on' : ''}" onclick="toggleTag('${escapeHtml(t.name)}')">${escapeHtml(t.name)} (${t.count})</span>`
  ).join('');
}

function toggleTag(name) {
  _tagFilter = _tagFilter === name ? null : name;
  renderTagFilter();
  updateClearBtn();
  refresh();
}

async function loadFilters() {
  try {
    const [folderRes, tagRes] = await Promise.all([
      fetch('/api/folders', { cache: 'no-store' }).then(r => r.json()),
      fetch('/api/tags', { cache: 'no-store' }).then(r => r.json()),
    ]);
    _allFolders = folderRes.folders || [];
    _allTags = tagRes.tags || [];
    // 渲染文件夹下拉
    const unclassified = folderRes.unclassified || 0;
    folderSelect.innerHTML = '<option value="">全部文件夹</option>' +
      (unclassified > 0 ? '<option value="__none__">未分类 (' + unclassified + ')</option>' : '') +
      _allFolders.map(f => `<option value="${escapeHtml(f.name)}">${escapeHtml(f.name)} (${f.count})</option>`).join('');
    folderSelect.value = _folderFilter === '__none__' ? '__none__' : (_folderFilter || '');
    filterBar.style.display = 'flex';
    renderTagFilter();
    updateClearBtn();
  } catch (_) {}
}

async function refresh() {
  await authReady;
  const query = searchInput.value.trim();
  const params = new URLSearchParams();
  if (query) params.set('q', query);
  if (_folderFilter) params.set('folder', _folderFilter === '__none__' ? '' : _folderFilter);
  if (_tagFilter) params.set('tag', _tagFilter);
  const qs = params.toString();
  const list = await (await fetch('/api/recordings' + (qs ? `?${qs}` : ''), { cache: 'no-store' })).json();
  const el = document.getElementById('list');
  if (!list.length) {
    el.innerHTML = `<div class="empty">${query || _folderFilter || _tagFilter ? '没有找到匹配的录音' : '暂无录音，先上传一个试试'}</div>`;
    return;
  }
  el.innerHTML = list.map(r => {
    const [label, cls] = STATUS[r.status] || [r.status, ''];
    const tags = (r.tags || []);
    const folder = r.folder;
    const tagHtml = (folder || tags.length) ? `<div class="item-tags">` +
      (folder ? `<span class="ft folder">📁 ${escapeHtml(folder)}</span>` : '') +
      tags.map(t => `<span class="ft tag">🏷️ ${escapeHtml(t)}</span>`).join('') +
      `</div>` : '';
    return `<div class="item" onclick="location.href='/detail.html?id=${r.id}'">
      <div><div class="t">${escapeHtml(r.title || r.originalName)}</div>
      <div class="meta">${new Date(r.createdAt).toLocaleString()} · ${(r.size / 1048576).toFixed(1)} MB</div>
      ${tagHtml}
      ${r.match ? `<div class="match">${escapeHtml(r.match)}</div>` : ''}</div>
      <span class="badge ${cls}">${label}</span></div>`;
  }).join('');
}
(async () => { await authReady; await loadFilters(); })();
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
