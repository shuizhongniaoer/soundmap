<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>声图 SoundMap</title>
<style>
  :root { --accent: #2e5a88; --bg: #f5f7fa; --card: #fff; --text: #1f2933; --muted: #7b8794; }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); }
  .wrap { max-width: 860px; margin: 0 auto; padding: 32px 20px; }
  h1 { font-size: 24px; color: var(--accent); }
  h1 small { font-size: 13px; color: var(--muted); font-weight: normal; margin-left: 8px; }
  .card { background: var(--card); border-radius: 12px; padding: 20px; margin-top: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .drop { border: 2px dashed #c3cdd8; border-radius: 10px; padding: 36px; text-align: center; color: var(--muted); cursor: pointer; transition: .15s; }
  .drop.over, .drop:hover { border-color: var(--accent); color: var(--accent); background: #eef3f8; }
  input[type=text] { width: 100%; padding: 10px 12px; border: 1px solid #d6dee6; border-radius: 8px; margin-top: 12px; font-size: 14px; }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 8px; padding: 10px 22px; font-size: 14px; margin-top: 12px; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  .item { display: flex; justify-content: space-between; align-items: center; padding: 14px 4px; border-bottom: 1px solid #eef1f4; cursor: pointer; }
  .item:hover .t { color: var(--accent); }
  .item .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .b-done { background: #e3f5e9; color: #1c7c3c; }
  .b-error { background: #fdeaea; color: #c0392b; }
  .b-working { background: #fff4e0; color: #b26a00; }
  .empty { color: var(--muted); text-align: center; padding: 24px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>声图 <small>录音 → 转写 → AI 总结 → 思维导图</small></h1>

  <div class="card">
    <div class="drop" id="drop">点击或拖拽上传音频文件（mp3 / m4a / wav / mp4 …）</div>
    <input type="file" id="file" accept="audio/*,video/mp4,.m4a,.amr,.opus" hidden>
    <input type="text" id="title" placeholder="标题（可选，留空由 AI 生成）">
    <div style="display:flex;gap:10px;align-items:center;margin-top:12px;font-size:13px;color:var(--muted)">
      转写引擎：
      <label><input type="radio" name="engine" value="" checked> 默认</label>
      <label><input type="radio" name="engine" value="xfyun"> 讯飞（长录音更准，约¥2/时）</label>
      <label><input type="radio" name="engine" value="dashscope"> 百炼（便宜，短对话分人稳）</label>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button id="submit" disabled>上传并开始处理</button>
      <button id="recBtn" style="background:#c0392b">🎙️ 录音</button>
      <span id="recHint" style="font-size:12px;color:var(--muted)"></span>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px">
      <b style="color:var(--accent)">热词表</b>
      <span style="font-size:12px;color:var(--muted)">人名、称呼、专有名词——大幅提升识别准确率；点热词可删除，保存后自动同步到百炼，下次转写生效</span>
    </div>
    <div id="hwChips" style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0"></div>
    <div style="display:flex;gap:8px">
      <input type="text" id="hwInput" placeholder="输入热词后按回车添加（如：商筠晞）" style="margin-top:0;flex:1">
      <button id="hwSave" style="margin-top:0">保存并同步</button>
    </div>
    <div id="hwStatus" style="font-size:12px;color:var(--muted);margin-top:8px"></div>
  </div>

  <div class="card">
    <div id="list"><div class="empty">暂无录音，先上传一个试试</div></div>
  </div>
</div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const submitBtn = document.getElementById('submit');
let picked = null;

drop.onclick = () => fileInput.click();
drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
drop.ondragleave = () => drop.classList.remove('over');
drop.ondrop = e => { e.preventDefault(); drop.classList.remove('over'); pick(e.dataTransfer.files[0]); };
fileInput.onchange = () => pick(fileInput.files[0]);

function pick(f) {
  if (!f) return;
  picked = f;
  drop.textContent = `已选择: ${f.name} (${(f.size / 1048576).toFixed(1)} MB)`;
  submitBtn.disabled = false;
}

// ===== 浏览器录音（MediaRecorder）=====
const recBtn = document.getElementById('recBtn');
const recHint = document.getElementById('recHint');
let mediaRecorder = null, chunks = [], recTimer = null, recStart = 0;

recBtn.onclick = async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') { mediaRecorder.stop(); return; }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    return alert('当前浏览器不支持录音，或页面不是 https/localhost');
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      clearInterval(recTimer);
      recBtn.textContent = '🎙️ 录音';
      recBtn.style.background = '#c0392b';
      recHint.textContent = '';
      const type = mediaRecorder.mimeType || 'audio/webm';
      const ext = type.includes('ogg') ? 'ogg' : type.includes('mp4') ? 'm4a' : 'webm';
      const ts = new Date();
      const name = `录音-${ts.getMonth() + 1}月${ts.getDate()}日 ${String(ts.getHours()).padStart(2, '0')}${String(ts.getMinutes()).padStart(2, '0')}.${ext}`;
      pick(new File([new Blob(chunks, { type })], name, { type }));
    };
    mediaRecorder.start();
    recStart = Date.now();
    recBtn.style.background = '#7b8794';
    recHint.textContent = '录音中，再次点击停止';
    recTimer = setInterval(() => {
      const s = Math.floor((Date.now() - recStart) / 1000);
      recBtn.textContent = `⏹ 停止 ${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
    }, 500);
  } catch (e) {
    alert('无法访问麦克风: ' + e.message);
  }
};

submitBtn.onclick = async () => {
  submitBtn.disabled = true;
  submitBtn.textContent = '上传中…';
  const fd = new FormData();
  fd.append('audio', picked);
  fd.append('title', document.getElementById('title').value);
  fd.append('asrProvider', document.querySelector('input[name=engine]:checked').value);
  try {
    const res = await fetch('/api/recordings', { method: 'POST', body: fd });
    const rec = await res.json();
    if (!res.ok) throw new Error(rec.error);
    location.href = `/detail.html?id=${rec.id}`;
  } catch (e) {
    alert('上传失败: ' + e.message);
    submitBtn.disabled = false;
  }
  submitBtn.textContent = '上传并开始处理';
};

// ===== 热词表管理 =====
let hwWords = [];
const hwChips = document.getElementById('hwChips');
const hwInput = document.getElementById('hwInput');
const hwStatus = document.getElementById('hwStatus');

function renderHw() {
  hwChips.innerHTML = hwWords.length
    ? hwWords.map((w, i) =>
        `<span data-i="${i}" style="background:#eef3f8;color:var(--accent);border-radius:20px;padding:4px 14px;font-size:13px;cursor:pointer" title="点击删除">${w} ×</span>`
      ).join('')
    : '<span style="font-size:13px;color:var(--muted)">暂无热词</span>';
  hwChips.querySelectorAll('span[data-i]').forEach(c =>
    c.onclick = () => { hwWords.splice(+c.dataset.i, 1); renderHw(); });
}

hwInput.onkeydown = e => {
  if (e.key !== 'Enter') return;
  const w = hwInput.value.trim();
  if (w && !hwWords.includes(w)) { hwWords.push(w); renderHw(); }
  hwInput.value = '';
};

document.getElementById('hwSave').onclick = async () => {
  if (hwInput.value.trim()) { hwInput.onkeydown({ key: 'Enter' }); }
  hwStatus.textContent = '同步中…';
  const res = await fetch('/api/hotwords', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ words: hwWords }),
  });
  const body = await res.json();
  hwStatus.textContent = res.ok
    ? `已保存 ${body.words.length} 个热词${body.vocabularyId ? '，已同步百炼（词表 ' + body.vocabularyId + '）' : body.note ? '（' + body.note + '）' : ''}`
    : '保存失败: ' + body.error;
};

(async () => {
  const d = await (await fetch('/api/hotwords')).json();
  hwWords = d.words;
  renderHw();
})();

const STATUS = {
  uploaded: ['排队中', 'b-working'], transcribing: ['转写中', 'b-working'],
  summarizing: ['AI 总结中', 'b-working'], done: ['完成', 'b-done'], error: ['失败', 'b-error'],
};

async function refresh() {
  const list = await (await fetch('/api/recordings')).json();
  const el = document.getElementById('list');
  if (!list.length) return;
  el.innerHTML = list.map(r => {
    const [label, cls] = STATUS[r.status] || [r.status, ''];
    return `<div class="item" onclick="location.href='/detail.html?id=${r.id}'">
      <div><div class="t">${r.title || r.originalName}</div>
      <div class="meta">${new Date(r.createdAt).toLocaleString()} · ${(r.size / 1048576).toFixed(1)} MB</div></div>
      <span class="badge ${cls}">${label}</span></div>`;
  }).join('');
}
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
