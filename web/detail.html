<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>录音详情 - 声图</title>
<style>
  :root { --accent: #2e5a88; --bg: #f5f7fa; --card: #fff; --text: #1f2933; --muted: #7b8794; }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); }
  .wrap { max-width: 960px; margin: 0 auto; padding: 24px 20px; }
  a.back { color: var(--muted); text-decoration: none; font-size: 14px; }
  h1 { font-size: 20px; margin: 10px 0; }
  audio { width: 100%; margin: 10px 0; }
  .tabs { display: flex; gap: 6px; margin-top: 14px; }
  .tab { padding: 9px 20px; border-radius: 8px 8px 0 0; background: #e4e9ef; cursor: pointer; font-size: 14px; }
  .tab.on { background: var(--card); color: var(--accent); font-weight: 600; }
  .panel { background: var(--card); border-radius: 0 12px 12px 12px; padding: 22px; min-height: 380px; box-shadow: 0 1px 3px rgba(0,0,0,.06); transition:background .25s; }
  .panel.sprout-skin { padding:0; overflow:hidden; background:#f1ecdf; border-radius:0 2px 2px 2px; box-shadow:0 12px 36px rgba(66,54,34,.15); }
  .seg { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f0f3f6; font-size: 14px; line-height: 1.7; }
  .seg.active { background: #eef5fc; box-shadow: inset 3px 0 var(--accent); }
  .seg .who { color: var(--accent); font-weight: 600; white-space: nowrap; cursor: pointer; }
  .seg .who:hover { text-decoration: underline; }
  .seg .txt { flex: 1; cursor: pointer; border-radius: 4px; padding: 0 4px; }
  .seg .txt:hover { background: #f2f6fa; }
  .seg .txt[contenteditable="true"] { background: #fffbe8; outline: 2px solid #e2c46d; }
  .seg .txt.fixed { border-bottom: 1px dashed #d9a441; }
  .seg .ts { color: var(--muted); font-size: 12px; white-space: nowrap; padding-top: 3px; cursor: pointer; }
  .seg .ts:hover { color: var(--accent); text-decoration: underline; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding-bottom: 12px; margin-bottom: 8px; border-bottom: 1px solid #e4e9ef; }
  .chip { background: #eef3f8; color: var(--accent); border-radius: 20px; padding: 4px 14px; font-size: 13px; cursor: pointer; }
  .chip:hover { background: #dbe7f2; }
  .hint { font-size: 12px; color: var(--muted); }
  h3 { color: var(--accent); font-size: 15px; margin: 18px 0 8px; }
  h3:first-child { margin-top: 0; }
  ul { padding-left: 22px; line-height: 1.9; font-size: 14px; }
  .abstract { font-size: 14px; line-height: 1.8; background: #f2f6fa; border-left: 3px solid var(--accent); padding: 12px 14px; border-radius: 0 8px 8px 0; }
  .qa-item { background: #f2f6fa; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; }
  .tpl-sel { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .tpl-sel label { font-size: 12px; color: #888; font-weight: 600; }
  .tpl-sel select { font-size: 13px; padding: 4px 10px; border: 1px solid #d0d8e0; border-radius: 6px; background: #fff; color: #333; cursor: pointer; }
  .tpl-sel small { font-size: 11px; color: #aaa; }
  #mindmap { width: 100%; height: 520px; }
  .status { text-align: center; color: var(--muted); padding: 80px 0; font-size: 15px; }
  .err { color: #c0392b; }
  button.re { background: none; border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
  button.re:disabled { cursor: wait; opacity: .55; }
  dialog.regen { width:min(620px,calc(100vw - 32px)); border:0; border-radius:16px; padding:0; color:var(--text); box-shadow:0 22px 70px rgba(18,31,45,.28); }
  dialog.regen::backdrop { background:rgba(25,36,48,.46); backdrop-filter:blur(2px); }
  .regen-head { padding:22px 24px 16px; border-bottom:1px solid #e9edf1; }
  .regen-head h2 { font-size:19px; margin-bottom:7px; }
  .regen-head p { color:var(--muted); font-size:12px; line-height:1.7; }
  .regen-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:18px 24px; }
  .regen-choice { text-align:left; border:1px solid #dfe5ea; background:#fff; border-radius:10px; padding:13px 14px; cursor:pointer; color:var(--text); }
  .regen-choice:hover { border-color:var(--accent); background:#f6f9fc; }
  .regen-choice b { display:block; font-size:14px; margin-bottom:5px; }
  .regen-choice small { display:block; color:var(--muted); font-size:11px; line-height:1.55; }
  .regen-choice.all { border-color:#b7c8a8; background:#f6f9f2; }
  .regen-choice.danger { border-color:#e3c3bb; background:#fff8f6; }
  .regen-foot { display:flex; justify-content:flex-end; padding:0 24px 20px; }
  .regen-cancel { border:0; background:#eef2f5; padding:8px 18px; border-radius:8px; cursor:pointer; }
  .sprout-report { min-height:520px; color:#2f2b23; font-family:"Songti SC","STSong","Noto Serif CJK SC",serif; background-color:#f4efe3; background-image:radial-gradient(rgba(82,66,39,.06) .65px,transparent .65px),linear-gradient(90deg,rgba(255,255,255,.22),transparent 45%,rgba(76,55,25,.025)); background-size:5px 5px,100% 100%; }
  .sprout-cover { padding:34px 42px 28px; border-bottom:1px solid rgba(70,57,36,.25); display:grid; grid-template-columns:1fr auto; gap:8px 24px; align-items:end; position:relative; }
  .sprout-cover:after { content:""; position:absolute; left:42px; bottom:-1px; width:76px; border-bottom:3px solid #546b42; }
  .sprout-kicker { grid-column:1/-1; font:600 10px/1.4 ui-monospace,monospace; letter-spacing:.22em; color:#7e745f; }
  .sprout-report-title { font-size:36px; line-height:1; letter-spacing:.12em; font-weight:800; }
  .sprout-date { font:12px/1.5 ui-monospace,monospace; color:#756b58; text-align:right; }
  .sprout-deck { grid-column:1/-1; max-width:640px; margin-top:9px; font-size:13px; line-height:1.8; color:#736b5d; letter-spacing:.035em; }
  .sprout-tools { display:flex; justify-content:space-between; gap:14px; align-items:center; padding:14px 42px; border-bottom:1px solid rgba(70,57,36,.14); color:#756c5c; font-size:12px; line-height:1.7; }
  .sprout-tools button.re { border-color:#756a53; color:#564b38; font-family:inherit; }
  .sprout-body { padding:8px 42px 44px; }
  .sprout-card { padding:30px 0 34px; border-bottom:1px solid rgba(74,60,36,.2); }
  .sprout-card:last-child { border-bottom:0; }
  .sprout-head { display:grid; grid-template-columns:42px 1fr; column-gap:12px; align-items:start; margin-bottom:20px; }
  .sprout-no { grid-row:1/3; font:700 24px/1 ui-monospace,monospace; color:#9d8655; padding-top:3px; }
  .sprout-title { font-size:23px; line-height:1.35; font-weight:800; letter-spacing:.045em; }
  .sprout-type { font:600 10px/1.5 ui-monospace,monospace; color:#587348; letter-spacing:.14em; margin-top:4px; }
  .seed-box { margin-left:54px; border-left:2px solid #71885f; background:rgba(239,244,230,.72); padding:14px 17px; font-size:13px; line-height:1.8; color:#45473d; }
  .seed-jump { background:none; border:0; color:#4c6840; padding:0; margin:0 0 7px; cursor:pointer; font:600 11px/1.5 ui-monospace,monospace; letter-spacing:.04em; }
  .seed-summary { margin:16px 0 0 54px; font-size:15px; line-height:1.95; color:#4a4439; }
  .sprout-section { margin:25px 0 0 54px; }
  .sprout-section-label { display:flex; align-items:center; gap:9px; margin-bottom:9px; font:700 11px/1.4 ui-monospace,monospace; letter-spacing:.13em; color:#8a7040; }
  .sprout-section-label:after { content:""; height:1px; flex:1; background:rgba(118,92,47,.18); }
  .sprout-reference { font-size:17px; font-weight:700; margin-bottom:8px; color:#44392b; }
  .sprout-echo,.sprout-expand { font-size:14px; line-height:2; white-space:pre-wrap; text-align:justify; }
  .sprout-expand:first-letter { font-size:1.65em; font-weight:700; color:#5c744d; }
  .sprout-aha { margin:25px 0 0 54px; padding:13px 16px; color:#72591f; background:rgba(255,246,208,.62); border-top:1px solid rgba(166,128,48,.28); border-bottom:1px solid rgba(166,128,48,.28); font-size:14px; line-height:1.8; }
  .sprout-growing { min-height:520px; display:flex; flex-direction:column; justify-content:center; align-items:center; color:#665e4f; font-family:"Songti SC","STSong",serif; background:#f4efe3; text-align:center; }
  .growing-mark { position:relative; width:74px; height:74px; margin-bottom:22px; }
  .growing-mark span { position:absolute; left:34px; bottom:5px; width:6px; height:6px; border-radius:50%; background:#637b51; animation:grow 2.8s ease-in-out infinite; transform-origin:bottom; }
  .growing-mark span:nth-child(2) { animation-delay:.55s; transform:rotate(55deg); }
  .growing-mark span:nth-child(3) { animation-delay:1.1s; transform:rotate(-55deg); }
  .growing-steps { display:flex; gap:18px; margin-top:13px; font:10px ui-monospace,monospace; letter-spacing:.12em; color:#908673; }
  .growing-steps span { animation:pulse 2.8s infinite; }
  .growing-steps span:nth-child(2){animation-delay:.55s}.growing-steps span:nth-child(3){animation-delay:1.1s}
  @keyframes grow { 0%,100%{height:6px;opacity:.3} 45%{height:62px;border-radius:60% 60% 45% 45%;opacity:1} }
  @keyframes pulse { 0%,100%{opacity:.3} 45%{opacity:1;color:#536e45} }
  @media(max-width:640px){.sprout-cover{padding:28px 22px 24px}.sprout-cover:after{left:22px}.sprout-report-title{font-size:30px}.sprout-tools{padding:13px 22px;align-items:flex-start}.sprout-body{padding:4px 22px 34px}.seed-box,.seed-summary,.sprout-section,.sprout-aha{margin-left:0}.sprout-head{grid-template-columns:34px 1fr}.sprout-no{font-size:19px}.sprout-title{font-size:20px}.regen-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">← 返回列表</a>
  <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
    <h1 id="title">加载中…</h1>
    <div style="display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
      <button class="re" onclick="exportWord()">导出 Word</button>
      <button class="re" onclick="exportTranscript('txt')">导出 TXT</button>
      <button class="re" onclick="exportTranscript('srt')">导出 SRT</button>
      <button class="re" id="reprocess-btn" onclick="openReprocess()">重新生成</button>
    </div>
  </div>
  <div id="folder-tags-bar" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px"></div>
  <audio id="player" controls preload="none"></audio>

  <div class="tabs">
    <div class="tab on" data-p="transcript">转写稿</div>
    <div class="tab" data-p="summary">AI 总结</div>
    <div class="tab" data-p="sprouts">灵感发芽</div>
    <div class="tab" data-p="mindmap">思维导图</div>
  </div>
  <div class="panel">
    <div id="p-transcript"><div class="status">处理中…</div></div>
    <div id="p-summary" hidden></div>
    <div id="p-sprouts" hidden><div class="status">发芽中…</div></div>
    <div id="p-mindmap" hidden>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <button class="re" onclick="exportMindmapPNG()">导出图片 PNG</button>
        <button class="re" onclick="exportMindmapMD()">导出 Markdown</button>
      </div>
      <svg id="mindmap"></svg>
    </div>
  </div>
</div>

<dialog class="regen" id="regen-dialog">
  <div class="regen-head"><h2>想重新生成哪一部分？</h2><p>单项生成只调用对应能力。除最后一项外，都不会重新转写，也不会覆盖人工修改。</p></div>
  <div class="regen-grid">
    <button class="regen-choice" onclick="runReprocess('summary')"><b>AI 总结</b><small>重新生成摘要、关键要点、待办和原话摘录</small></button>
    <button class="regen-choice" onclick="runReprocess('sprouts')"><b>灵感发芽</b><small>重新筛种、寻找遥远回声并生成发芽报告</small></button>
    <button class="regen-choice" onclick="runReprocess('mindmap')"><b>思维导图</b><small>只重建导图结构，不改动其他内容</small></button>
    <button class="regen-choice" onclick="runReprocess('proofread')"><b>转写稿优化</b><small>基于上下文谨慎纠错，保留识别原文供核对</small></button>
    <button class="regen-choice all" onclick="runReprocess('all')"><b>全部重新生成</b><small>优化转写稿，并重做总结、发芽和思维导图</small></button>
    <button class="regen-choice danger" onclick="runReprocess('all', true)"><b>重新转写并全部生成</b><small>覆盖人工修正，重新产生 ASR 和大模型调用费用</small></button>
  </div>
  <div class="regen-foot"><button class="regen-cancel" onclick="document.getElementById('regen-dialog').close()">取消</button></div>
</dialog>

<script src="/vendor/d3.min.js"></script>
<script src="/vendor/markmap-lib.js"></script>
<script src="/vendor/markmap-view.js"></script>
<script>
const id = new URLSearchParams(location.search).get('id');
let rec = null, mmRendered = false;
let pollTimer = null;
let renderedTranscriptSignature = null;
let activeSegment = -1;
let templates = [];
const player = document.getElementById('player');

document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  t.classList.add('on');
  ['transcript', 'summary', 'sprouts', 'mindmap'].forEach(p =>
    document.getElementById('p-' + p).hidden = p !== t.dataset.p);
  document.querySelector('.panel').classList.toggle('sprout-skin', t.dataset.p === 'sprouts');
  if (t.dataset.p === 'mindmap') renderMindmap();
});

const fmt = s => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
const esc = s => String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function scheduleLoad(delay = 2500) {
  clearTimeout(pollTimer);
  pollTimer = setTimeout(load, delay);
}

function updateProcessButton() {
  const btn = document.getElementById('reprocess-btn');
  const working = rec && !['done', 'error'].includes(rec.status);
  btn.disabled = !!working;
  btn.textContent = working ? '处理中…' : '重新生成';
}

function renderFolderTags() {
  const bar = document.getElementById('folder-tags-bar');
  if (!rec) { bar.style.display = 'none'; return; }
  const folder = rec.folder;
  const tags = rec.tags || [];
  bar.style.display = 'flex';
  bar.innerHTML =
    `<span style="font-size:13px;color:var(--muted)">分类：</span>` +
    (folder
      ? `<span class="chip" style="background:#e3edf6;color:var(--accent);border-radius:16px;padding:3px 12px;font-size:13px;cursor:default">📁 ${esc(folder)}</span>`
      : `<span style="font-size:13px;color:var(--muted)">未分类</span>`) +
    (tags.length ? tags.map(t => `<span class="chip" style="background:#f0f0f0;color:#666;border-radius:16px;padding:3px 12px;font-size:13px;cursor:default">🏷️ ${esc(t)}</span>`).join('') : '') +
    `<button class="re" style="font-size:12px;padding:3px 10px" onclick="editFolderTags()">编辑</button>`;
}

async function editFolderTags() {
  const folder = prompt('文件夹（留空=未分类）：', rec.folder || '');
  if (folder === null) return;
  const tagsStr = prompt('标签（逗号分隔，如：重要, 待跟进）：', (rec.tags || []).join(', '));
  if (tagsStr === null) return;
  const tags = tagsStr.split(',').map(t => t.trim()).filter(Boolean);
  try {
    const res = await fetch('/api/recordings/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ folder: folder.trim(), tags }),
    });
    if (!res.ok) throw new Error((await res.json()).error || '保存失败');
    rec.folder = folder.trim() || null;
    rec.tags = tags;
    renderFolderTags();
  } catch (e) {
    alert('保存失败: ' + e.message);
  }
}

async function load() {
  clearTimeout(pollTimer);
  try {
    const res = await fetch('/api/recordings/' + id, { cache: 'no-store' });
    if (res.status === 401) { location.href = '/'; return; }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    rec = await res.json();
    updateProcessButton();
    document.getElementById('title').textContent = rec.title || rec.originalName;
    renderFolderTags();
    const audioSrc = '/api/recordings/' + encodeURIComponent(rec.id) + '/audio';
    if (player.getAttribute('src') !== audioSrc) player.src = audioSrc;

    const tEl = document.getElementById('p-transcript');
    if (rec.status === 'error') {
      tEl.innerHTML = `<div class="status err">处理失败：${esc(rec.error || '')}</div>`;
      return;
    }
    if (rec.transcript) renderTranscript();
    if (rec.summary) {
      const s = rec.summary;
      const curTpl = (rec.summaryTemplate || 'auto');
      const tplOptions = templates.map(t => `<option value="${t.id}"${t.id === curTpl ? ' selected' : ''}>${esc(t.name)}</option>`).join('');
      const tplLabel = templates.find(t => t.id === curTpl);
      document.getElementById('p-summary').innerHTML =
        `<div class="tpl-sel"><label>总结模板</label><select onchange="switchTemplate(this.value)">${tplOptions}</select>${tplLabel ? `<small>${esc(tplLabel.desc)}</small>` : ''}</div>` +
        (s.type ? `<span style="display:inline-block;background:#eef3f8;color:var(--accent);border-radius:20px;padding:3px 14px;font-size:12px;margin-bottom:6px">${esc(s.type)}</span>` : '') +
        `<h3>摘要</h3><div class="abstract">${esc(s.abstract || '')}</div>` +
        `<h3>关键要点</h3><ul>${(s.key_points || []).map(k => `<li>${esc(k)}</li>`).join('')}</ul>` +
        ((s.todos || []).length ? `<h3>待办事项</h3><ul>${s.todos.map(t => `<li>${esc(t.task)}${t.owner ? `（${esc(t.owner)}）` : ''}</li>`).join('')}</ul>` : '') +
        ((s.quotes || []).length ? `<h3>原话摘录</h3><ul>${s.quotes.map(q => `<li>"${esc(q)}"</li>`).join('')}</ul>` : '') +
        ((s.qa_pairs || []).length ? `<h3>问答对</h3>${s.qa_pairs.map(qa => `<div class="qa-item"><p><b>Q: ${esc(qa.q)}</b></p><p style="color:#444;margin:4px 0 0">A: ${esc(qa.a)}</p></div>`).join('')}` : '');
    }
    renderSprouts();
    if (!['done', 'error'].includes(rec.status)) scheduleLoad();
    else if (!document.getElementById('p-mindmap').hidden) renderMindmap();
  } catch (error) {
    console.warn('状态轮询失败，将自动重试:', error);
    const tEl = document.getElementById('p-transcript');
    if (!rec || !rec.transcript) {
      tEl.innerHTML = '<div class="status">连接暂时中断，正在自动重试…</div>';
    }
    scheduleLoad();
  }
}

function renderSprouts() {
  const el = document.getElementById('p-sprouts');
  const items = rec && rec.sprouts && Array.isArray(rec.sprouts.items) ? rec.sprouts.items : null;
  if (items == null) {
    el.innerHTML = !rec || !['done', 'error'].includes(rec.status)
      ? `<div class="sprout-growing"><div class="growing-mark"><span></span><span></span><span></span></div><b>有些念头，需要一点时间才肯显出形状</b><div class="growing-steps"><span>筛选种子</span><span>寻找回声</span><span>等待开花</span></div></div>`
      : '<div class="status">这条旧录音还没有生成发芽，点击右上角“重新生成”即可补上。</div>';
    return;
  }
  if (!items.length) {
    el.innerHTML = '<div class="status">这段录音没有足够扎实的发芽点。宁缺毋滥，不为凑数硬掰。</div>';
    return;
  }
  const reportDate = new Date((rec.sprouts && rec.sprouts.generatedAt) || rec.updatedAt || rec.createdAt || Date.now())
    .toLocaleDateString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit' }).replaceAll('/', ' · ');
  el.innerHTML = `<div class="sprout-report">
    <header class="sprout-cover"><div class="sprout-kicker">SOUNDMAP · SPROUT REPORT</div><div class="sprout-report-title">发芽报告</div><div class="sprout-date">${esc(reportDate)}<br>${items.length} 枚种子</div><div class="sprout-deck">从一段声音里拾取尚未说完的念头，让它越过日常，与更辽阔的人类经验彼此照亮。</div></header>
    <div class="sprout-tools"><span>这是 AI 的启发式延展，不等同于事实摘要；典故与判断值得继续核验。</span><button class="re" onclick="exportSprouts()">导出报告</button></div>
    <main class="sprout-body">${items.map((item, index) => `<article class="sprout-card">
      <div class="sprout-head"><span class="sprout-no">${String(index + 1).padStart(2, '0')}</span><span class="sprout-title">${esc(item.title)}</span><span class="sprout-type">${esc(item.type || '联想')} · GERMINATION</span></div>
      <div class="seed-box"><button class="seed-jump" data-start="${Number(item.start) || 0}" data-end="${sproutEnd(item)}">🌱 种子 · ${fmt(item.start || 0)} ${esc(item.speaker || '')} · 回听这一句</button><br>“${esc(item.source)}”</div>
      ${item.seedSummary ? `<div class="seed-summary">${esc(item.seedSummary)}</div>` : ''}
      ${item.echo ? `<section class="sprout-section"><div class="sprout-section-label">遥远的回声</div><div class="sprout-reference">${esc(item.reference || '')}</div><div class="sprout-echo">${esc(item.echo)}</div></section>` : ''}
      <section class="sprout-section"><div class="sprout-section-label">开花</div><div class="sprout-expand">${esc(item.expansion)}</div></section>
      <div class="sprout-aha">✦ <b>Aha</b>　${esc(item.aha)}</div>
    </article>`).join('')}</main></div>`;
  el.querySelectorAll('.seed-jump').forEach(button => button.onclick = () => {
    const start = Number(button.dataset.start) || 0;
    const end = Number(button.dataset.end);
    sproutPlayUntil = end > start ? end : null;
    player.currentTime = start;
    player.play().catch(() => {});
  });
}

function sproutEnd(item) {
  const start = Number(item.start) || 0;
  if (Number(item.end) > start) return Number(item.end);
  const segment = rec && rec.transcript && rec.transcript.segments && rec.transcript.segments[item.segmentIndex];
  return segment && Number(segment.end) > start ? Number(segment.end) : start + 8;
}

function renderTranscript() {
  const tEl = document.getElementById('p-transcript');
  const segs = rec.transcript.segments;
  const signature = JSON.stringify(segs.map(s => [s.start, s.end, s.speaker, s.text, s.orig]));
  if (signature === renderedTranscriptSignature && tEl.querySelector('.seg')) return;
  renderedTranscriptSignature = signature;
  const speakers = [...new Set(segs.map(s => s.speaker))];
  tEl.innerHTML =
    `<div class="chips">${speakers.map(sp => `<span class="chip" data-sp="${esc(sp)}">${esc(sp)} ✏️</span>`).join('')}
     <span class="hint">点时间或文字跳转播放 · 双击文字改错字 · 点说话人修改姓名</span></div>` +
    segs.map((s, i) =>
      `<div class="seg" data-i="${i}" data-start="${Number(s.start) || 0}" data-end="${Number(s.end) || 0}"><span class="ts" data-i="${i}" title="从这里播放">${fmt(s.start)}</span><span class="who" data-i="${i}" title="修改这句的说话人">${esc(s.speaker)}</span><span class="txt${s.orig ? ' fixed' : ''}" data-i="${i}" title="${s.orig ? 'AI 已校对，识别原文: ' + esc(s.orig) + '（双击修改）' : '点击播放，双击修改文字'}">${esc(s.text)}</span></div>`
    ).join('');
  tEl.querySelectorAll('.chip').forEach(c => c.onclick = () => renameSpeaker(c.dataset.sp));
  tEl.querySelectorAll('.who').forEach(w => w.onclick = () => editSegSpeaker(+w.dataset.i));
  tEl.querySelectorAll('.ts').forEach(t => t.onclick = () => seekToSegment(+t.dataset.i));
  tEl.querySelectorAll('.txt').forEach(t => {
    t.onclick = () => {
      if (!window.getSelection().toString()) seekToSegment(+t.dataset.i);
    };
    t.ondblclick = e => { e.preventDefault(); editSegText(t, +t.dataset.i); };
  });
  updateActiveSegment();
}

function seekToSegment(i) {
  const seg = rec && rec.transcript && rec.transcript.segments[i];
  if (!seg) return;
  sproutPlayUntil = null;
  player.currentTime = Number(seg.start) || 0;
  player.play().catch(() => {});
  setActiveSegment(i, true);
}

function setActiveSegment(i, scroll = false) {
  if (i === activeSegment && !scroll) return;
  activeSegment = i;
  document.querySelectorAll('#p-transcript .seg').forEach((el, index) =>
    el.classList.toggle('active', index === i));
  if (scroll && i >= 0) {
    const el = document.querySelector(`#p-transcript .seg[data-i="${i}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function updateActiveSegment() {
  const segs = rec && rec.transcript && rec.transcript.segments;
  if (!segs || !segs.length) return;
  const time = player.currentTime;
  let found = -1;
  for (let i = 0; i < segs.length; i++) {
    const start = Number(segs[i].start) || 0;
    const nextStart = i + 1 < segs.length ? Number(segs[i + 1].start) : Infinity;
    const rawEnd = Number(segs[i].end);
    const end = rawEnd > start ? rawEnd : nextStart;
    if (time >= start && time < end) { found = i; break; }
  }
  setActiveSegment(found);
}

let sproutPlayUntil = null;
player.addEventListener('timeupdate', () => {
  updateActiveSegment();
  if (sproutPlayUntil != null && player.currentTime >= sproutPlayUntil - 0.08) {
    const stopAt = sproutPlayUntil;
    sproutPlayUntil = null;
    player.pause();
    player.currentTime = stopAt;
  }
});
player.addEventListener('seeked', updateActiveSegment);

async function patchJSON(url, body) {
  const res = await fetch(url, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) alert('保存失败: ' + (await res.json()).error);
  return res.ok;
}

async function renameSpeaker(from) {
  const to = prompt(`把「${from}」的所有发言批量改为：`, from);
  if (!to || to.trim() === from) return;
  if (await patchJSON(`/api/recordings/${id}/speakers`, { from, to: to.trim() })) afterEdit(true);
}

async function editSegSpeaker(i) {
  const cur = rec.transcript.segments[i].speaker;
  const to = prompt('这句话的说话人改为：', cur);
  if (!to || to.trim() === cur) return;
  if (await patchJSON(`/api/recordings/${id}/segments/${i}`, { speaker: to.trim() })) afterEdit(true);
}

function editSegText(el, i) {
  if (el.isContentEditable) return;
  const orig = rec.transcript.segments[i].text;
  el.contentEditable = 'true';
  el.focus();
  const finish = async save => {
    el.contentEditable = 'false';
    const now = el.textContent.trim();
    if (!save || !now || now === orig) { el.textContent = orig; return; }
    if (await patchJSON(`/api/recordings/${id}/segments/${i}`, { text: now })) {
      rec.transcript.segments[i].text = now;
      dirty = true;
    } else el.textContent = orig;
  };
  el.onblur = () => finish(true);
  el.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    if (e.key === 'Escape') { el.onblur = null; finish(false); }
  };
}

let dirty = false;
async function afterEdit(askRegen) {
  await load();
  if (askRegen && confirm('已保存。要用修改后的内容重新生成总结、发芽和思维导图吗？\n（不会重新转写，但会产生大模型调用费用）')) runReprocess('ai');
}

function renderMindmap() {
  if (mmRendered || !rec || !rec.mindmap) return;
  document.getElementById('mindmap').innerHTML = '';
  const { Transformer } = window.markmap;
  const { root } = new Transformer().transform(rec.mindmap);
  window.markmap.Markmap.create('#mindmap', { autoFit: true }, root);
  mmRendered = true;
}

function download(url, name) {
  const a = document.createElement('a');
  a.href = url;
  if (name) a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function exportWord() {
  location.href = `/api/recordings/${id}/export/docx`;
}

function exportTranscript(format) {
  location.href = `/api/recordings/${id}/export/${format}`;
}

function exportSprouts() {
  if (!rec || !rec.sprouts || !(rec.sprouts.items || []).length) return alert('灵感发芽还没生成');
  location.href = `/api/recordings/${id}/export/sprouts.md`;
}

function exportMindmapMD() {
  if (!rec || !rec.mindmap) return alert('思维导图还没生成');
  location.href = `/api/recordings/${id}/export/mindmap.md`;
}

async function exportMindmapPNG() {
  if (!mmRendered) renderMindmap();
  if (!rec || !rec.mindmap) return alert('思维导图还没生成');
  const svg = document.getElementById('mindmap');
  const box = svg.getBoundingClientRect();
  const clone = svg.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  clone.setAttribute('width', box.width);
  clone.setAttribute('height', box.height);
  // 把页面里 markmap 相关样式内联进 SVG，避免导出后丢样式
  let css = 'foreignObject div{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;}';
  for (const sheet of document.styleSheets) {
    try {
      for (const rule of sheet.cssRules) if (/markmap|mm-/.test(rule.cssText)) css += rule.cssText;
    } catch {} // 跨域样式表跳过
  }
  const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
  styleEl.textContent = css;
  clone.insertBefore(styleEl, clone.firstChild);

  const svgBlob = new Blob([new XMLSerializer().serializeToString(clone)], { type: 'image/svg+xml;charset=utf-8' });
  const svgUrl = URL.createObjectURL(svgBlob);
  const img = new Image();
  try {
    await new Promise((ok, fail) => { img.onload = ok; img.onerror = fail; img.src = svgUrl; });
    const scale = 2; // 2x 高清导出
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(box.width * scale);
    canvas.height = Math.round(box.height * scale);
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(b => download(URL.createObjectURL(b), `${rec.title || '思维导图'}.png`), 'image/png');
  } catch {
    alert('PNG 导出失败，已改为下载 SVG 矢量图');
    download(svgUrl, `${rec.title || '思维导图'}.svg`);
  } finally {
    setTimeout(() => URL.revokeObjectURL(svgUrl), 10000);
  }
}

function openReprocess() {
  if (rec && !['done', 'error'].includes(rec.status)) return;
  document.getElementById('regen-dialog').showModal();
}

async function runReprocess(part, full = false) {
  document.getElementById('regen-dialog').close();
  if (full && !confirm('这会重新转写音频、覆盖人工修正并产生新的转写费用。确定继续吗？')) return;
  const params = new URLSearchParams({ part });
  if (full) params.set('full', '1');
  if (full) {
    const cur = (rec && rec.asrProvider) || '默认';
    const p = prompt(
      `转写引擎（当前: ${cur}）\n输入 local / xfyun / volcengine 可换引擎，留空沿用当前`, '');
    if (p && ['local', 'xfyun', 'volcengine', 'dashscope', 'mock'].includes(p.trim())) {
      params.set('provider', p.trim());
    }
  }
  try {
    const res = await fetch(`/api/recordings/${id}/reprocess?${params}`, { method: 'POST' });
    if (!res.ok) throw new Error((await res.json()).error || `HTTP ${res.status}`);
    const refreshAll = part === 'all';
    rec = {
      ...(rec || {}), status: full ? 'uploaded' : 'summarizing',
      ...((refreshAll || part === 'summary' || part === 'ai') ? { summary: null } : {}),
      ...((refreshAll || part === 'sprouts' || part === 'ai') ? { sprouts: null } : {}),
      ...((refreshAll || part === 'mindmap' || part === 'ai') ? { mindmap: null } : {}),
      ...(full ? { transcript: null } : {}),
    };
    if (refreshAll || part === 'mindmap' || part === 'ai') {
      mmRendered = false;
      document.getElementById('mindmap').innerHTML = '';
    }
    updateProcessButton();
    if (full) document.getElementById('p-transcript').innerHTML = '<div class="status">重新转写中…</div>';
    if (refreshAll || part === 'summary' || part === 'ai') document.getElementById('p-summary').innerHTML = '<div class="status">总结生成中…</div>';
    if (refreshAll || part === 'sprouts' || part === 'ai') renderSprouts();
    scheduleLoad(300);
  } catch (error) {
    alert('重新生成失败: ' + error.message);
    scheduleLoad(0);
  }
}

async function switchTemplate(tplId) {
  const cur = (rec && rec.summaryTemplate) || 'auto';
  if (tplId === cur) return;
  document.getElementById('p-summary').innerHTML = '<div class="status">正在用新模板生成…</div>';
  const params = new URLSearchParams({ part: 'summary', template: tplId });
  try {
    const res = await fetch(`/api/recordings/${id}/reprocess?${params}`, { method: 'POST' });
    if (!res.ok) throw new Error((await res.json()).error || `HTTP ${res.status}`);
    rec = { ...(rec || {}), status: 'summarizing', summary: null, summaryTemplate: tplId };
    updateProcessButton();
    scheduleLoad(300);
  } catch (error) {
    alert('切换模板失败: ' + error.message);
    scheduleLoad(0);
  }
}

async function loadTemplates() {
  try {
    const res = await fetch('/api/templates');
    if (res.ok) templates = await res.json();
  } catch {}
}

load();
loadTemplates();
</script>
